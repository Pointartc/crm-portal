<div class="space-y-8">

            <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 15.75l7.5-7.5 7.5 7.5" />
          </svg>
          +4.3%
        </span>
      </div>
    </div>

    <!-- Tasks Completed -->

        <div class="rounded-lg bg-violet-500/10 p-2">

        <div>

          <p class="mt-2 text-2xl font-bold tracking-tight text-white">24.8%</p>

        <div class="flex-1 rounded-sm bg-indigo-500/60 h-[60%]"></div>
