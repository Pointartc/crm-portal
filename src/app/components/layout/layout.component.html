<div class="flex h-screen overflow-hidden bg-slate-950">
  <!-- Sidebar -->
  <aside class="flex w-64 shrink-0 flex-col bg-slate-900/40 backdrop-blur-xl border-r border-slate-800/60">
    <div class="flex h-16 items-center border-b border-slate-800/60 px-6">
      <span class="text-lg font-bold tracking-tight text-white">
        Nexus<span class="text-indigo-400">CRM</span>
      </span>
    </div>
    <nav class="flex-1 space-y-1 p-4">
      <a
        routerLink="/dashboard"
        routerLinkActive="border-l-4 border-indigo-500 bg-indigo-500/10 text-indigo-300"
        [routerLinkActiveOptions]="{ exact: true }"
        class="flex items-center gap-3 rounded-r-lg border-l-4 border-transparent px-4 py-2.5 text-sm font-medium text-slate-400 transition-all duration-200 hover:bg-slate-800/50 hover:text-slate-200"
      >
        <svg class="h-5 w-5 shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z" />
        </svg>
        Dashboard
      </a>
      <a
        routerLink="/leads"
        routerLinkActive="border-l-4 border-indigo-500 bg-indigo-500/10 text-indigo-300"
        class="flex items-center gap-3 rounded-r-lg border-l-4 border-transparent px-4 py-2.5 text-sm font-medium text-slate-400 transition-all duration-200 hover:bg-slate-800/50 hover:text-slate-200"
      >
        <svg class="h-5 w-5 shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M18 18.72a9.094 9.094 0 003.741-.479 3 3 0 00-4.682-2.72m.94 3.198l.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0112 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 016 18.719m12 0a5.971 5.971 0 00-.941-3.197m0 0A5.995 5.995 0 0012 12.75a5.995 5.995 0 00-5.058 2.772m0 0a3 3 0 00-4.681 2.72 8.986 8.986 0 003.74.477m.94-3.197a5.971 5.971 0 00-.94 3.197M15 6.75a3 3 0 11-6 0 3 3 0 016 0zm6 3a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0zm-13.5 0a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z" />
        </svg>
        Leads
      </a>
      <a
        routerLink="/tasks"
        routerLinkActive="border-l-4 border-indigo-500 bg-indigo-500/10 text-indigo-300"
        class="flex items-center gap-3 rounded-r-lg border-l-4 border-transparent px-4 py-2.5 text-sm font-medium text-slate-400 transition-all duration-200 hover:bg-slate-800/50 hover:text-slate-200"
      >
        <svg class="h-5 w-5 shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25zM6.75 12h.008v.008H6.75V12zm0 3h.008v.008H6.75V15zm0 3h.008v.008H6.75V18z" />
        </svg>
        Tasks
      </a>
    </nav>
  </aside>
  <!-- Main column -->
  <div class="flex flex-1 flex-col overflow-hidden">
    <!-- Header -->
    <header class="flex h-16 shrink-0 items-center justify-between border-b border-slate-800/60 px-6">
      <div></div>
      <div class="flex items-center gap-4">
        @if (currentUser(); as user) {
          <div class="flex items-center gap-3">
            <img
              [src]="user.image"
              [alt]="user.firstName + ' ' + user.lastName"
              class="h-9 w-9 rounded-full border-2 border-slate-700 object-cover ring-2 ring-indigo-500/20"
            />
            <div class="hidden text-right sm:block">
              <p class="text-sm font-medium text-white">{{ user.firstName }} {{ user.lastName }}</p>
              <p class="text-xs text-slate-400">{{ user.email }}</p>
            </div>
          </div>
        }
        <button
          type="button"
          (click)="onLogout()"
          class="rounded-lg p-2 text-slate-400 transition-all duration-200 hover:bg-rose-500/10 hover:text-rose-400"
          title="Sign out"
        >
          <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" />
          </svg>
        </button>
      </div>
    </header>
    <!-- Content -->
    <main class="flex-1 overflow-y-auto p-6">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
